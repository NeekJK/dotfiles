# ==============================================================================
# SYSTEM & CLIPBOARD (KUBUNTU X11)
# ==============================================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -sg escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on

# Fix for Kubuntu X11 (Requires: sudo apt install xclip)
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -se c -i"
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -se c -i"

# ==============================================================================
# KEYBINDINGS
# ==============================================================================
unbind C-b
set -g prefix `
bind ` send-prefix

unbind -
unbind =
bind = split-window -h
bind - split-window -v

# Pane Navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resizing
bind -r h resize-pane -L 5
bind -r l resize-pane -R 5
bind -r k resize-pane -U 5
bind -r j resize-pane -D 5

# Utils
bind w kill-pane
bind T command-prompt -p "Rename pane:" "select-pane -T '%%'"
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"
bind y setw synchronize-panes \; display "Sync: #{?synchronize-panes,ON,OFF}"

# ==============================================================================
# APPEARANCE (EXACT REFERENCE MATCH)
# ==============================================================================

set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Panes (Top Border)
set -g pane-border-status top
set -g pane-border-format "#{?@custom_title, [ #{@custom_title} ] , [ #T ] }"
set -g pane-border-style 'fg=colour44'
set -g pane-active-border-style 'fg=colour118'

# Status Bar Base
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=colour44 bg=black'  # Ensure bg is explicitly black

set -g status-left ''
set -g status-left-length 10

# Status Right (Clock)
set -g status-right-style 'fg=black bg=colour44'
set -g status-right ' %Y-%m-%d %H:%M '
set -g status-right-length 50

# Active Window Tab (Green-ish selection)
setw -g window-status-current-style 'fg=black bg=colour44'
setw -g window-status-current-format ' #I #W #F '

# Inactive Window Tabs
setw -g window-status-style 'fg=colour44 bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

# Misc
setw -g clock-mode-colour yellow
setw -g mode-style 'fg=black bg=red bold'
set -g message-style 'fg=yellow bg=red bold'
setw -g window-status-bell-style 'fg=yellow bg=red bold'

# ==============================================================================
# PLUGINS
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'

run '~/.tmux/plugins/tpm/tpm'

# split panes using | and -
bind -n M-+ split-window -h
bind -n M-_ split-window -v
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-W kill-pane

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=colour44'
set -g pane-active-border-style 'fg=colour118'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=colour44'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=colour44'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=colour44'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=colour44 bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=yellow bg=red bold'
